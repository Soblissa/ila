<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ILA Screen Builder</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: #18a0fb;
      box-shadow: 0 0 0 2px rgba(24, 160, 251, 0.15);
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #btn-build {
      background: #18a0fb;
      color: #fff;
    }

    #btn-build:hover:not(:disabled) {
      background: #0d8fe0;
    }

    #btn-cancel {
      background: #eee;
      color: #333;
    }

    #btn-cancel:hover {
      background: #ddd;
    }

    #btn-example {
      background: transparent;
      border: 1px solid #ccc;
      color: #555;
      font-size: 11px;
      flex: none;
      padding: 9px 12px;
    }

    #btn-example:hover {
      background: #f0f0f0;
    }

    #result {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    #result.success {
      background: #e6f9f0;
      border: 1px solid #34c77b;
      color: #1a6640;
    }

    #result.error {
      background: #fef2f2;
      border: 1px solid #f87171;
      color: #7f1d1d;
    }

    #result .result-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    #result .error-list {
      margin-top: 6px;
      padding-left: 16px;
    }

    #result .error-list li {
      margin-top: 3px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>🏗️ ILA Screen Builder</h1>
  <p class="subtitle">KI-Agenten-Plugin für Figma · ILA-Pilotprojekt</p>

  <label for="json-input">JSON-Eingabe</label>
  <textarea
    id="json-input"
    placeholder='{"screen_name": "...", "page": "Agent-Entwürfe", "size": "desktop", "components": []}'
    spellcheck="false"
    autocorrect="off"
    autocapitalize="off"
  ></textarea>

  <div class="button-row">
    <button id="btn-build">Screen erstellen</button>
    <button id="btn-example" title="Beispiel-JSON laden">Beispiel</button>
    <button id="btn-cancel">Abbrechen</button>
  </div>

  <div id="result"></div>

  <script>
    const EXAMPLE_JSON = {
      screen_name: "Foerderplan_Initial_V1",
      page: "Agent-Entwürfe",
      size: "desktop",
      components: [
        { name: "Notiz", x: 40, y: 100 },
        { name: "Evaluation", x: 40, y: 300 }
      ]
    };

    const textarea = document.getElementById("json-input");
    const btnBuild = document.getElementById("btn-build");
    const btnCancel = document.getElementById("btn-cancel");
    const btnExample = document.getElementById("btn-example");
    const resultBox = document.getElementById("result");

    // Beispiel laden
    btnExample.addEventListener("click", () => {
      textarea.value = JSON.stringify(EXAMPLE_JSON, null, 2);
      resultBox.style.display = "none";
    });

    // Abbrechen
    btnCancel.addEventListener("click", () => {
      parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
    });

    // Screen erstellen
    btnBuild.addEventListener("click", () => {
      const json = textarea.value.trim();

      if (!json) {
        showResult(false, "Bitte JSON eingeben.", []);
        return;
      }

      // JSON vorab validieren
      try {
        JSON.parse(json);
      } catch (e) {
        showResult(false, `Ungültiges JSON: ${e.message}`, []);
        return;
      }

      setLoading(true);
      resultBox.style.display = "none";

      parent.postMessage(
        { pluginMessage: { type: "build-screen", json } },
        "*"
      );
    });

    // Ergebnis vom Plugin-Code empfangen
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg || msg.type !== "result") return;

      setLoading(false);
      showResult(msg.success, msg.message, msg.errors || []);
    };

    function setLoading(loading) {
      btnBuild.disabled = loading;
      btnBuild.innerHTML = loading
        ? '<span class="spinner"></span>Erstelle Screen…'
        : "Screen erstellen";
    }

    function showResult(success, message, errors) {
      resultBox.className = success ? "success" : "error";
      resultBox.style.display = "block";

      let html = `<div class="result-title">${success ? "✅" : "❌"} ${escapeHtml(message)}</div>`;

      if (errors && errors.length > 0) {
        html += `<ul class="error-list">`;
        for (const err of errors) {
          html += `<li>${escapeHtml(err)}</li>`;
        }
        html += `</ul>`;
      }

      resultBox.innerHTML = html;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
